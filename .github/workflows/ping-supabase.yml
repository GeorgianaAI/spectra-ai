name: Ping Supabase (keep-alive)

on:
  schedule:
    - cron: "0 9 * * 1" # Monday 09:00 UTC
    - cron: "0 9 * * 4" # Thursday 09:00 UTC — twice a week keeps clear of the 7-day inactivity window
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping SpectraAI Supabase
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/jobs?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "User-Agent: SpectraAI-Keepalive")
          echo "HTTP status: $HTTP_STATUS"
          if [[ "$HTTP_STATUS" == "000" || -z "$HTTP_STATUS" ]]; then
            echo "SpectraAI Supabase: UNREACHABLE — project may be suspended or URL is wrong"
            exit 1
          else
            echo "SpectraAI Supabase: ALIVE ($HTTP_STATUS) — REST query confirmed project is active"
          fi
