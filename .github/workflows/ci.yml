name: CI

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck-app:
    name: spectra-app — lint + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/spectra-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/spectra-app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  lint-and-typecheck-api:
    name: spectra-api — lint + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/spectra-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/spectra-api/package-lock.json
      - run: npm ci
      - run: npm run build

  test-app:
    name: spectra-app — unit tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck-app
    defaults:
      run:
        working-directory: apps/spectra-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/spectra-app/package-lock.json
      - run: npm ci
      - run: npm run test

  test-api:
    name: spectra-api — unit tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck-api
    defaults:
      run:
        working-directory: apps/spectra-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/spectra-api/package-lock.json
      - run: npm ci
      - run: npm run test
